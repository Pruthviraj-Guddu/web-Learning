<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Interactive Water Tank</title>
    <style>
        /* --- GLOBAL & LAYOUT --- */
        @import url('https://fonts.googleapis.com/css?family=Work+Sans:700');

        body,
        html {
            margin: 0;
            padding: 0;
            background-color: #3ad8ff;
            /* Cyan theme */
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            color: white;
        }

        .container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- LEFT COLUMN: TANK VISUALIZATION --- */
        .tank-section {
            /* Keep it transparent */
        }

        .tank-wrapper {
            position: relative;
            width: 300px;
            height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Water Animation Layer */
        .loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .water {
            position: absolute;
            width: 200%;
            height: 200%;
            background: white;
            border-radius: 40%;
            /* Rounded wave edges */
            left: -50%;
            top: 110%;
            /* Initial Empty */
            animation: wave 5s linear infinite;
            transition: top 0.3s ease-out;
        }

        /* SVG Overlay Layer */
        .tank-svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        #mask-layer {
            fill: #3ad8ff;
            /* Matches background */
        }

        /* --- MIDDLE COLUMN: SLIDER --- */
        .slider-section {
            flex-direction: column;
            gap: 20px;
        }

        input[type=range] {
            -webkit-appearance: slider-vertical;
            width: 8px;
            height: 250px;
            cursor: pointer;
        }

        /* --- RIGHT COLUMN: TEXT & BULB --- */
        .text-section {
            flex-direction: column;
            padding: 40px;
            text-align: left;
            align-items: flex-start;
        }

        h2 {
            margin-bottom: 10px;
        }

        .bulb-container {
            width: 100%;
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }

        /* Bulb CSS */
        .cfl-container {
            position: relative;
            text-align: center;
        }

        .cfl-container svg {
            height: 250px;
            /* Reduced size slightly for layout balance */
            width: 280px;
            transform: rotate(180deg);
            margin-top: 20px;
        }

        /* Cord for the bulb */
        .cfl-container::before {
            position: absolute;
            content: "";
            width: 10px;
            height: 50%;
            background: #212121;
            z-index: -1;
            top: -40%;
            left: 50%;
            margin-left: -5px;
        }

        /* Bulb transitions */
        .cfl-container .bulb-inner {
            transition: all 0.2s ease;
        }

        .cfl-container .streaks {
            stroke: transparent;
            transition: all 0.15s ease;
        }

        /* Bulb ON state */
        .cfl-container.on .bulb-inner {
            fill: #f7d756 !important;
            /* Yellow light */
        }

        .cfl-container.on .streaks {
            stroke: #f7d756;
            /* Yellow streaks */
        }

        /* --- ANIMATIONS --- */
        @keyframes wave {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LEFT: Water Tank -->
        <div class="section tank-section">
            <div class="tank-wrapper">

                <!-- Waving Water -->
                <div class="loader">
                    <div class="water" id="water"></div>
                </div>

                <!-- SVG Overlay -->
                <svg class="tank-svg-overlay" viewBox="0 0 30 42" preserveAspectRatio="none">
                    <path id="mask-layer"
                        d="M 0,0 V 42 H 30 V 0 Z 
                             M 13.55,2.04 c 1,2.53 4.33,7.53 10,15 a 12.8,12.8 0 1 1 -20,0 c 5.66,-7.46 9,-12.46 10,-15 z" />

                    <path fill="transparent" stroke="#ffffff" stroke-width="0.8"
                        d="M 13.55,2.04 c 1,2.53 4.33,7.53 10,15 a 12.8,12.8 0 1 1 -20,0 c 5.66,-7.46 9,-12.46 10,-15 z" />
                </svg>

            </div>
        </div>

        <!-- MIDDLE: Slider -->
        <div class="section slider-section">
            <input type="range" id="levelSlider" min="0" max="100" value="0">
            <span id="levelText" style="font-size: 1.2rem; font-weight: bold;">0%</span>
        </div>

        <!-- RIGHT: Description + Bulb -->
        <div class="section text-section">
            <h2>Water Level Control</h2>
            <p>Drag the slider to fill the tank.</p>
            <p>If the water falls below 25%, the warning light turns ON.</p>

            <div class="bulb-container">
                <div class="cfl-container" id="bulb">
                    <svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 275.3 413.3"
                        xml:space="preserve">
                        <g id="off">
                            <path class="bulb-inner" fill="#dedede" d="M137.7,13.7C67.2,13.7,10,70.9,10,141.4c0,58.3,72.8,118.2,79.9,162.3h47.8h47.8
                                     c7.1-44,48.9-80.9,78.9-122.3C265.3,50.9,208.2,13.7,137.7,13.7z" />
                        </g>

                        <g id="outline">
                            <path fill="#888" stroke="#212121" stroke-width="15" stroke-miterlimit="10"
                                d="M168.5,375.5h-61.7c-8.9,0-16-7.2-16-16 v-55.8h93.8v55.8C184.6,368.3,177.4,375.5,168.5,375.5z" />
                            <line fill="#333333" stroke="#212121" stroke-width="15" stroke-miterlimit="10" x1="184.6"
                                y1="339.6" x2="90.8" y2="339.6" />
                            <path fill="none" stroke="#212121" stroke-width="15" stroke-miterlimit="10"
                                d="M137.7,13.7C67.2,13.7,10,70.9,10,141.4 c0,58.3,72.8,118.2,79.9,162.3h47.8h47.8c7.1-44,79.9-103.9,79.9-162.3C265.3,70.9,208.2,13.7,137.7,13.7z" />
                        </g>

                        <g class="streaks">
                            <line x1="320" y1="245" x2="280" y2="230" style="stroke-width:15; stroke-linecap: round;" />
                            <line x1="340" y1="150" x2="300" y2="150" style="stroke-width:15; stroke-linecap: round;" />
                            <line x1="330" y1="50" x2="290" y2="70" style="stroke-width:15; stroke-linecap: round;" />
                            <line x1="-10" y1="230" x2="-50" y2="245" style="stroke-width:15; stroke-linecap: round;" />
                            <line x1="-25" y1="150" x2="-65" y2="150" style="stroke-width:15; stroke-linecap: round;" />
                            <line x1="-20" y1="70" x2="-60" y2="50" style="stroke-width:15; stroke-linecap: round;" />
                        </g>
                    </svg>
                </div>
            </div>

        </div>

    </div>

    <script>
        const slider = document.getElementById("levelSlider");
        const water = document.getElementById("water");
        const text = document.getElementById("levelText");
        const bulb = document.getElementById("bulb");

        function updateLevel() {
            const val = Number(slider.value);
            text.textContent = val + "%";

            // Water Mapping: 
            // 0% slider => top: 120% (low)
            // 50% slider => top: 20%
            // 100% slider => top: -80% (very high)
            const topPos = 120 - (val * 2);
            water.style.top = topPos + "%";

            // Bulb Logic:
            // If water <= 25%, turn bulb ON (add class 'on')
            // Otherwise, turn bulb OFF (remove class 'on')
            if (val <= 25) {
                bulb.classList.add("on");
            } else {
                bulb.classList.remove("on");
            }
        }

        slider.addEventListener("input", updateLevel);
        updateLevel(); // Run once on load
    </script>

</body>

</html>
