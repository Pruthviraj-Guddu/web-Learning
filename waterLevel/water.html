<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Interactive Water Tank</title>
    <style>
        /* --- GLOBAL & LAYOUT --- */
        body,
        html {
            margin: 0;
            padding: 0;
            background-color: #3ad8ff;
            /* Cyan theme from snippet 2 */
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            height: 100vh;
            color: white;
        }

        .container {
            display: flex;
            height: 100%;
            width: 100%;
        }

        .section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* --- LEFT COLUMN: TANK VISUALIZATION --- */
        .tank-section {
            /* Keep it transparent to blend with body */
        }

        /* Wrapper acts as the coordinate system for the tank */
        .tank-wrapper {
            position: relative;
            width: 300px;
            /* Adjust size of the tank here */
            height: 420px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 1. The Water (Bottom Layer) */
        /* This is the spinning square that moves up/down */
        .loader {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            /* Ensures water doesn't spill outside visual area logic */
            z-index: 1;
        }

        .water {
            position: absolute;
            width: 200%;
            /* Much larger than container to ensure coverage during rotation */
            height: 200%;
            background: white;
            border-radius: 40%;
            /* Creates the rounded wave edges */
            left: -50%;

            /* Initial position (Empty) */
            top: 110%;

            /* Animations */
            animation: wave 5s linear infinite;
            /* Keeps it spinning */
            transition: top 0.3s ease-out;
            /* Smooth movement when slider changes */
        }

        /* 2. The SVG Mask & Outline (Top Layer) */
        /* Sits on top of the water to hide the messy square edges */
        .tank-svg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            /* Must be higher than .loader */
            pointer-events: none;
            /* Allows clicks to pass through if needed */
        }

        /* Ensure the mask color matches the body background exactly */
        #mask-layer {
            fill: #3ad8ff;
        }

        /* --- MIDDLE COLUMN: SLIDER --- */
        .slider-section {
            flex-direction: column;
            gap: 20px;
        }

        /* Vertical Slider Styling */
        input[type=range] {
            -webkit-appearance: slider-vertical;
            /* Standard for Chrome/Safari */
            width: 8px;
            height: 250px;
            cursor: pointer;
        }

        /* --- RIGHT COLUMN: TEXT --- */
        .text-section {
            flex-direction: column;
            padding: 40px;
            text-align: left;
            align-items: flex-start;
        }

        h2 {
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            max-width: 300px;
            height: 150px;
            margin-top: 20px;
            padding: 15px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            resize: none;
        }

        textarea::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        /* --- ANIMATIONS --- */
        @keyframes wave {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- LEFT: Water Tank -->
        <div class="section tank-section">
            <div class="tank-wrapper">

                <!-- The Waving Water Div -->
                <div class="loader">
                    <div class="water" id="water"></div>
                </div>

                <!-- The SVG Overlay (Mask + Border) -->
                <svg class="tank-svg-overlay" viewBox="0 0 30 42" preserveAspectRatio="none">
                    <!-- 1. The Mask: Covers everything OUTSIDE the droplet with Blue -->
                    <!-- This path is a rectangle minus the droplet shape -->
                    <path id="mask-layer"
                        d="M 0,0 V 42 H 30 V 0 Z 
                             M 13.55,2.04 c 1,2.53 4.33,7.53 10,15 a 12.8,12.8 0 1 1 -20,0 c 5.66,-7.46 9,-12.46 10,-15 z" />

                    <!-- 2. The Border: Draws the white outline on top -->
                    <path fill="transparent" stroke="#ffffff" stroke-width="0.8"
                        d="M 13.55,2.04 c 1,2.53 4.33,7.53 10,15 a 12.8,12.8 0 1 1 -20,0 c 5.66,-7.46 9,-12.46 10,-15 z" />
                </svg>

            </div>
        </div>

        <!-- MIDDLE: Slider -->
        <div class="section slider-section">
            <input type="range" id="levelSlider" min="0" max="100" value="0">
            <span id="levelText" style="font-size: 1.2rem; font-weight: bold;">0%</span>
        </div>

        <!-- RIGHT: Description -->
        <div class="section text-section">
            <h2>Water Level Control</h2>
            <p>Drag the slider to fill the tank.</p>
            <p>The water uses CSS rotation to simulate waves, masked by an SVG overlay.</p>
            <textarea placeholder="Log observations here..."></textarea>
        </div>

    </div>

    <script>
        const slider = document.getElementById("levelSlider");
        const water = document.getElementById("water");
        const text = document.getElementById("levelText");

        // Function to update water level
        function updateLevel() {
            const val = slider.value;
            text.textContent = val + "%";

            // Calculation logic:
            // 0% on slider  => top: 110% (Water completely hidden below)
            // 100% on slider => top: -10% (Water covers the top of the shape)
            // 0 -> 120%, 50 -> 100%, 100 -> 0%
            const topPos = 120 - (val * 2);  // [web:2][web:3]


            water.style.top = topPos + "%";
        }

        // Initialize and Listen
        slider.addEventListener("input", updateLevel);
        updateLevel(); // Set initial state
    </script>

</body>

</html>
